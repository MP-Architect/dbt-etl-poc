version: 2

models:
  - name: stg_orders
    columns:
      - name: order_id
        tests: [unique, not_null]
      - name: order_amount
        tests:
          - not_null
          - dbt_utils.accepted_range:
              min_value: 0
      - name: order_status
        tests:
          - accepted_values:
              values: ["pending", "shipped", "cancelled"]

  - name: orders_summary
    columns:
      - name: product_name
        tests: [not_null]
      - name: total_revenue
        tests: [not_null]
